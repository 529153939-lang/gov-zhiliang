<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>合格证分析 - 质量安全监督信息系统</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    .stat-value {
      font-size: 32px;
      font-weight: 700;
      color: #1890ff;
      margin-bottom: 5px;
    }
    .stat-label {
      font-size: 14px;
      color: #666;
    }
    .date-range input {
      padding: 6px 12px;
      border: 1px solid #d9d9d9;
      border-radius: 4px;
    }
    /* 指标解释说明样式 */
    .tooltip-icon {
      position: relative;
      display: inline-block;
      margin-left: 5px;
      cursor: help;
      vertical-align: middle;
    }
    
    .tooltip-icon svg {
      width: 16px;
      height: 16px;
      vertical-align: middle;
    }
    
    .tooltip-icon:hover::after {
      content: attr(data-tooltip);
      position: absolute;
      bottom: 100%;
      left: 50%;
      transform: translateX(-50%);
      background-color: rgba(0, 0, 0, 0.8);
      color: white;
      padding: 8px 12px;
      border-radius: 4px;
      font-size: 12px;
      white-space: nowrap;
      z-index: 1000;
      margin-bottom: 5px;
    }
  </style>
</head>
<body>
  <div class="page-container">
    <!-- 页面头部 -->
    <div class="page-header">
      <div class="breadcrumb">
        <a href="index.html">首页</a> &gt; <a href="certificate-management.html">合格证管理</a> &gt; 合格证分析
      </div>
    </div>
    
    <!-- 分析头部 -->
    <div class="analysis-header">
      <h2>合格证分析</h2>
      <div class="date-range">
        <label>时间范围：</label>
        <input type="date" id="startDate" value="2026-01-01">
        <span>至</span>
        <input type="date" id="endDate" value="2026-02-28">
        <button class="btn btn-primary" onclick="updateData()">查询</button>
      </div>
    </div>
    
    <!-- 统计卡片 -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-value">1,245</div>
        <div class="stat-label">
          总合格证数
          <span class="tooltip-icon" data-tooltip="COUNT(合格证编号) - 统计系统中所有的合格证数量">
            <svg t="1772329946582" class="icon" viewBox="0 0 1024 1024" version="1.1" xmlns="http://www.w3.org/2000/svg" p-id="2144" width="200" height="200"><path d="M512 128c212.064 0 384 171.936 384 384s-171.936 384-384 384S128 724.064 128 512 299.936 128 512 128z m0 64C335.296 192 192 335.296 192 512s143.296 320 320 320 320-143.296 320-320S688.704 192 512 192z m6.848 429.728a48 48 0 1 1 0 96 48 48 0 0 1 0-96zM516.576 320a32 32 0 0 1 32 32v182.848a32 32 0 1 1-64 0V352a32 32 0 0 1 32-32z" fill="#bfbfbf" p-id="2145"></path></svg>
          </span>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-value">1,189</div>
        <div class="stat-label">
          有效合格证数
          <span class="tooltip-icon" data-tooltip="COUNT WHERE 状态 = '有效' - 统计状态为有效的合格证数量">
            <svg t="1772329946582" class="icon" viewBox="0 0 1024 1024" version="1.1" xmlns="http://www.w3.org/2000/svg" p-id="2144" width="200" height="200"><path d="M512 128c212.064 0 384 171.936 384 384s-171.936 384-384 384S128 724.064 128 512 299.936 128 512 128z m0 64C335.296 192 192 335.296 192 512s143.296 320 320 320 320-143.296 320-320S688.704 192 512 192z m6.848 429.728a48 48 0 1 1 0 96 48 48 0 0 1 0-96zM516.576 320a32 32 0 0 1 32 32v182.848a32 32 0 1 1-64 0V352a32 32 0 0 1 32-32z" fill="#bfbfbf" p-id="2145"></path></svg>
          </span>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-value">4.5%</div>
        <div class="stat-label">
          合格证作废/过期率
          <span class="tooltip-icon" data-tooltip="(作废数+过期数) / 总数 - 统计作废和过期的合格证占比">
            <svg t="1772329946582" class="icon" viewBox="0 0 1024 1024" version="1.1" xmlns="http://www.w3.org/2000/svg" p-id="2144" width="200" height="200"><path d="M512 128c212.064 0 384 171.936 384 384s-171.936 384-384 384S128 724.064 128 512 299.936 128 512 128z m0 64C335.296 192 192 335.296 192 512s143.296 320 320 320 320-143.296 320-320S688.704 192 512 192z m6.848 429.728a48 48 0 1 1 0 96 48 48 0 0 1 0-96zM516.576 320a32 32 0 0 1 32 32v182.848a32 32 0 1 1-64 0V352a32 32 0 0 1 32-32z" fill="#bfbfbf" p-id="2145"></path></svg>
          </span>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-value">8</div>
        <div class="stat-label">
          临近过期预警
          <span class="tooltip-icon" data-tooltip="统计未来3/7天内即将过期的合格证数量">
            <svg t="1772329946582" class="icon" viewBox="0 0 1024 1024" version="1.1" xmlns="http://www.w3.org/2000/svg" p-id="2144" width="200" height="200"><path d="M512 128c212.064 0 384 171.936 384 384s-171.936 384-384 384S128 724.064 128 512 299.936 128 512 128z m0 64C335.296 192 192 335.296 192 512s143.296 320 320 320 320-143.296 320-320S688.704 192 512 192z m6.848 429.728a48 48 0 1 1 0 96 48 48 0 0 1 0-96zM516.576 320a32 32 0 0 1 32 32v182.848a32 32 0 1 1-64 0V352a32 32 0 0 1 32-32z" fill="#bfbfbf" p-id="2145"></path></svg>
          </span>
        </div>
      </div>
    </div>
    
    <!-- 图表网格 -->
    <div class="chart-grid">
      <!-- 每日合格证开具量 -->
      <div class="chart-card">
        <div class="chart-title">
          每日合格证开具量
          <span class="tooltip-icon" data-tooltip="COUNT(合格证编号) GROUP BY 开具日期 - 展示不同日期的合格证开具数量">
            <svg t="1772329946582" class="icon" viewBox="0 0 1024 1024" version="1.1" xmlns="http://www.w3.org/2000/svg" p-id="2144" width="200" height="200"><path d="M512 128c212.064 0 384 171.936 384 384s-171.936 384-384 384S128 724.064 128 512 299.936 128 512 128z m0 64C335.296 192 192 335.296 192 512s143.296 320 320 320 320-143.296 320-320S688.704 192 512 192z m6.848 429.728a48 48 0 1 1 0 96 48 48 0 0 1 0-96zM516.576 320a32 32 0 0 1 32 32v182.848a32 32 0 1 1-64 0V352a32 32 0 0 1 32-32z" fill="#bfbfbf" p-id="2145"></path></svg>
          </span>
        </div>
        <div class="chart-container">
          <canvas id="certificateTrendChart"></canvas>
        </div>
      </div>
      
      <!-- 主体开证排行 -->
      <div class="chart-card">
        <div class="chart-title">
          主体开证排行
          <span class="tooltip-icon" data-tooltip="COUNT(合格证编号) GROUP BY 生码主体 - 统计各主体的合格证开具数量排行">
            <svg t="1772329946582" class="icon" viewBox="0 0 1024 1024" version="1.1" xmlns="http://www.w3.org/2000/svg" p-id="2144" width="200" height="200"><path d="M512 128c212.064 0 384 171.936 384 384s-171.936 384-384 384S128 724.064 128 512 299.936 128 512 128z m0 64C335.296 192 192 335.296 192 512s143.296 320 320 320 320-143.296 320-320S688.704 192 512 192z m6.848 429.728a48 48 0 1 1 0 96 48 48 0 0 1 0-96zM516.576 320a32 32 0 0 1 32 32v182.848a32 32 0 1 1-64 0V352a32 32 0 0 1 32-32z" fill="#bfbfbf" p-id="2145"></path></svg>
          </span>
        </div>
        <div class="chart-container">
          <canvas id="subjectRankChart"></canvas>
        </div>
      </div>
      
      <!-- 产品开证排行 -->
      <div class="chart-card">
        <div class="chart-title">
          产品开证排行
          <span class="tooltip-icon" data-tooltip="COUNT(合格证编号) GROUP BY 产品名称 - 统计各产品的合格证开具数量排行">
            <svg t="1772329946582" class="icon" viewBox="0 0 1024 1024" version="1.1" xmlns="http://www.w3.org/2000/svg" p-id="2144" width="200" height="200"><path d="M512 128c212.064 0 384 171.936 384 384s-171.936 384-384 384S128 724.064 128 512 299.936 128 512 128z m0 64C335.296 192 192 335.296 192 512s143.296 320 320 320 320-143.296 320-320S688.704 192 512 192z m6.848 429.728a48 48 0 1 1 0 96 48 48 0 0 1 0-96zM516.576 320a32 32 0 0 1 32 32v182.848a32 32 0 1 1-64 0V352a32 32 0 0 1 32-32z" fill="#bfbfbf" p-id="2145"></path></svg>
          </span>
        </div>
        <div class="chart-container">
          <canvas id="productRankChart"></canvas>
        </div>
      </div>
      
      <!-- 承诺事项履约分析 -->
      <div class="chart-card">
        <div class="chart-title">
          承诺事项履约分析
          <span class="tooltip-icon" data-tooltip="按承诺事项数量分布，查看不同承诺量下的合格证占比">
            <svg t="1772329946582" class="icon" viewBox="0 0 1024 1024" version="1.1" xmlns="http://www.w3.org/2000/svg" p-id="2144" width="200" height="200"><path d="M512 128c212.064 0 384 171.936 384 384s-171.936 384-384 384S128 724.064 128 512 299.936 128 512 128z m0 64C335.296 192 192 335.296 192 512s143.296 320 320 320 320-143.296 320-320S688.704 192 512 192z m6.848 429.728a48 48 0 1 1 0 96 48 48 0 0 1 0-96zM516.576 320a32 32 0 0 1 32 32v182.848a32 32 0 1 1-64 0V352a32 32 0 0 1 32-32z" fill="#bfbfbf" p-id="2145"></path></svg>
          </span>
        </div>
        <div class="chart-container">
          <canvas id="promiseAnalysisChart"></canvas>
        </div>
      </div>
    </div>
    

  </div>
  
  <script>
    // 初始化图表
    function initCharts() {
      // 每日合格证开具量
      const trendCtx = document.getElementById('certificateTrendChart').getContext('2d');
      const trendChart = new Chart(trendCtx, {
        type: 'line',
        data: {
          labels: ['1月', '2月', '3月', '4月', '5月', '6月', '7月', '8月', '9月', '10月', '11月', '12月'],
          datasets: [{
            label: '合格证开具数量',
            data: [85, 120, 145, 160, 180, 210, 195, 170, 150, 130, 110, 95],
            borderColor: '#5B8FF9',
            backgroundColor: 'rgba(91, 143, 249, 0.1)',
            tension: 0.3,
            fill: true
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: {
              position: 'top',
            }
          },
          scales: {
            y: {
              beginAtZero: true
            }
          }
        }
      });
      
      // 主体开证排行
      const subjectRankCtx = document.getElementById('subjectRankChart').getContext('2d');
      const subjectRankChart = new Chart(subjectRankCtx, {
        type: 'bar',
        data: {
          labels: ['凤凰农业有限公司', '绿源蔬菜合作社', '果丰家庭农场', '海鲜养殖合作社', '蓝天种植基地'],
          datasets: [{
            label: '开证数量',
            data: [520, 310, 280, 135, 85],
            backgroundColor: '#5B8FF9'
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: {
              display: false
            }
          },
          scales: {
            y: {
              beginAtZero: true
            }
          }
        }
      });
      
      // 产品开证排行
      const productRankCtx = document.getElementById('productRankChart').getContext('2d');
      const productRankChart = new Chart(productRankCtx, {
        type: 'bar',
        data: {
          labels: ['草莓', '蔬菜', '蓝莓', '水产品', '板栗'],
          datasets: [{
            label: '开证数量',
            data: [456, 324, 278, 187, 95],
            backgroundColor: '#5AD8A6'
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: {
              display: false
            }
          },
          scales: {
            y: {
              beginAtZero: true
            }
          }
        }
      });
      
      // 承诺事项履约分析
      const promiseAnalysisCtx = document.getElementById('promiseAnalysisChart').getContext('2d');
      const promiseAnalysisChart = new Chart(promiseAnalysisCtx, {
        type: 'doughnut',
        data: {
          labels: ['1项承诺', '2项承诺', '3项承诺', '4项及以上'],
          datasets: [{
            data: [280, 420, 350, 195],
            backgroundColor: [
              '#5B8FF9',
              '#5AD8A6',
              '#F6BD16',
              '#E86452'
            ]
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: {
              position: 'bottom',
            }
          }
        }
      });
      

    }
    
    // 更新数据
    function updateData() {
      const startDate = document.getElementById('startDate').value;
      const endDate = document.getElementById('endDate').value;
      // 实际项目中应该根据日期范围请求数据
      alert('查询时间范围：' + startDate + ' 至 ' + endDate);
    }
    
    // 页面加载完成后初始化图表
    window.onload = function() {
      initCharts();
    };
  </script>
</body>
</html>
