  <script>
    // 当前选中的页面
    let currentPage = 'dashboard.html';
    
    // 切换子菜单
    function toggleSubMenu(element) {
      const menuItem = element.parentElement;
      menuItem.classList.toggle('open');
    }
    
    // 加载页面内容
    function loadPage(pageUrl) {
      currentPage = pageUrl;
      
      // 移除所有菜单项的活动状态
      const menuItems = document.querySelectorAll('.menu-item');
      menuItems.forEach(item => {
        item.classList.remove('active');
      });
      
      // 移除所有子菜单项的活动状态
      const subMenuItems = document.querySelectorAll('.sub-menu-item');
      subMenuItems.forEach(item => {
        item.classList.remove('active');
      });
      
      // 获取当前点击的元素
      const currentLink = event.target.closest('a');
      
      // 判断是一级菜单还是二级菜单
      const parentMenuItem = currentLink.closest('.menu-item');
      const subMenuItem = currentLink.closest('.sub-menu-item');
      
      if (subMenuItem) {
        // 二级菜单选中
        subMenuItem.classList.add('active');
        parentMenuItem.classList.add('active');
        parentMenuItem.classList.add('open');
      } else {
        // 一级菜单选中（无子菜单的情况，如Dashboard）
        parentMenuItem.classList.add('active');
      }
      
      // 加载页面内容
      const contentDiv = document.getElementById('content');
      contentDiv.innerHTML = '<div class="loading"></div> 加载中...';
      
      // 模拟加载延迟
      setTimeout(() => {
        contentDiv.innerHTML = `<iframe src="${pageUrl}" width="100%" height="100%" frameborder="0"></iframe>`;
      }, 500);
    }
    
    // 退出登录
    function logout() {
      if (confirm('确定要退出登录吗？')) {
        window.location.href = 'login.html';
      }
    }
    
    // 初始加载dashboard页面
      window.onload = function() {
        // 设置Dashboard的二级菜单为默认选中
        const dashboardMenu = document.querySelector('.menu-item:first-child');
        const dashboardSubMenu = document.querySelector('.menu-item:first-child .sub-menu-item');
        if (dashboardMenu && dashboardSubMenu) {
          dashboardMenu.classList.add('active', 'open');
          dashboardSubMenu.classList.add('active');
        }
        
        const contentDiv = document.getElementById('content');
        contentDiv.innerHTML = '<div class="loading"></div> 加载中...';
        
        setTimeout(() => {
          contentDiv.innerHTML = `<iframe src="dashboard.html" width="100%" height="100%" frameborder="0"></iframe>`;
        }, 500);
      };
  </script>
